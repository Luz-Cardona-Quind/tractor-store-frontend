@if (headerComponent(); as comp) {
  <ng-container *ngComponentOutlet="comp" />
} @else if (headerFailed()) {
  <shell-header-fallback />
}

<main class="shell-main">
  <router-outlet />
</main>

@if (footerComponent(); as comp) {
  <ng-container *ngComponentOutlet="comp" />
} @else if (footerFailed()) {
  <shell-footer-fallback />
}
